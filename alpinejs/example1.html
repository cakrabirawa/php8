<html>
  <head>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <div x-data="{ nama: '' }">
      <input type="text" x-model="nama" placeholder="Masukkan nama" />
      <p>Halo, <span x-text="nama"></span>!</p>
    </div>
    <div>
      <input type="radio" x-model="gender" value="Laki-laki" /> Laki-laki
      <input type="radio" x-model="gender" value="Perempuan" /> Perempuan

      <p x-text="gender"></p>
    </div>
    <div>
      <select x-model="pilihan">
        <option value="">-- Pilih --</option>
        <option value="satu">Satu</option>
        <option value="dua">Dua</option>
      </select>

      <p x-text="pilihan"></p>
    </div>
    <div x-data="{ tampil: true }">
      <button @click="tampil = !tampil">Toggle</button>
      <p x-show="tampil">Ini akan tampil atau tersembunyi</p>
    </div>
    <div class="max-w-sm">
      <!-- Label -->
      <label
        for="email"
        class="block text-sm font-semibold text-gray-700 mb-1.5"
      >
        Alamat Email
      </label>

      <!-- Input Field -->
      <input
        type="email"
        id="email"
        name="email"
        placeholder="nama@email.com"
        class="w-full px-3.5 py-2 border border-gray-300 rounded-lg shadow-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 transition duration-150"
      />

      <!-- Pesan Error / Keterangan (Opsional) -->
      <p class="mt-1.5 text-xs text-red-600">
        Email yang Anda masukkan tidak valid.
      </p>
    </div>
    <div x-data="{ items: [], baru: '' }">
      <input type="text" x-model="baru" placeholder="Masukkan item" />
      <button type="button" @click="items.push(baru); baru = ''">Tambah</button>

      <ul>
        <template x-for="(item, i) in items" :key="i">
          <li x-text="item"></li>
        </template>
      </ul>
    </div>
  </body>
</html>
